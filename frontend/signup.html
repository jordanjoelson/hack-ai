<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schwep — Create Account</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700;900&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/shared.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
  </head>
  <body>
    <!-- clouds -->
    <img class="cloud cloud-tl" src="assets/images/transparentcloud1.png" alt="" />
    <img class="cloud cloud-tr" src="assets/images/transparentcloud2.png" alt="" />
    <img class="cloud cloud-bl" src="assets/images/transparentcloud1.png" alt="" />
    <img class="cloud cloud-br" src="assets/images/transparentcloud2.png" alt="" />
    <img class="cloud cloud-ml" src="assets/images/transparentcloud1.png" alt="" />
    <img class="cloud cloud-mr" src="assets/images/transparentcloud2.png" alt="" />

    <!-- blimp -->
    <img class="blimp-sky" src="assets/images/MARTYBLIMP.png" alt="" />

    <div class="card">
      <!-- LEFT: form -->
      <div class="card-left">
        <h1 class="form-headline">Get <em>started</em></h1>
        <p class="form-sub">Create your account to begin extracting your design DNA.</p>

        <form
          onsubmit="
            event.preventDefault();
            window.location.href = 'engine.html';
            return false;
          "
        >
          <!-- name + email side by side -->
          <div class="fields-row">
            <div class="field">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="John Doe" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" />
            </div>
          </div>

          <!-- passwords side by side -->
          <div class="fields-row">
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="••••••••" />
            </div>
            <div class="field">
              <label for="confirm-password">Confirm Password</label>
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-submit">Create Account</button>

            <div class="or-row">
              <div class="or-line"></div>
              <div class="or-text">OR</div>
              <div class="or-line"></div>
            </div>

            <a href="engine.html" class="btn-google">
              <span class="g-icon"></span>
              Continue with Google
            </a>
          </div>
        </form>
      </div>

      <!-- RIGHT: branding -->
      <div class="card-right">
        <div class="logo">
          <div class="logo-text"><img src="assets/images/schwep.png" alt="schwep" /></div>
          <div class="logo-tag">Create Account</div>
        </div>

        <p class="card-tagline">
          Discover your<br /><em>design DNA</em><br />in minutes.
        </p>

        <div class="switch-row">
          Already have an account? <a href="login.html">Sign in</a>
        </div>

        <div class="small-print">
          By continuing, you agree to our <a href="#">Terms</a> and
          <a href="#">Privacy Policy</a>.
        </div>
      </div>
    </div>
  </body>
</html>

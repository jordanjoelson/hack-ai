<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schwep — Your Design DNA</title>
    <link rel="stylesheet" href="assets/css/dna.css" />
  </head>
  <body>
    <div class="app done-mode">
      <!-- ══ TOP BAR ══ -->
      <div class="top-bar">
        <button class="back-btn" id="btn-back" onclick="window.location.href = 'engine.html'">
          <div class="back-arrow">
            <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
              <path
                d="M6 1L1 6l5 5"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <span>Redo</span>
        </button>
      </div>

      <!-- ══ DONE SCREEN ══ -->
      <div class="done-screen show" id="done-screen">
        <div id="ds-output"><!-- built by dna.js --></div>
        <div style="display: flex; gap: 12px; margin-top: 12px">
          <button class="done-btn" id="btn-again">✦ Build Yours</button>
          <button class="done-btn" id="btn-copy" style="background: var(--orange)">Copy DNA</button>
        </div>
      </div>
    </div>

    <script src="assets/js/dna.js"></script>
  </body>
</html>

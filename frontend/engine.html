              '<div style="padding:40px;text-align:center;color:#c00;">Error: ' +
              (err.message || err) +
              '</div>';
        }
      }

      function buildTrack() {
        // Seg row: [group0] [node] [group1] [node] [group2] [node] [group3]
        const row = document.getElementById('seg-row');
        const lblRow = document.getElementById('seg-labels');
        row.innerHTML = '';
        lblRow.innerHTML = '';

        ROUNDS.forEach((r, ri) => {
          // label
          const lbl = document.createElement('div');
          lbl.className = 'seg-lbl';
          lbl.id = `slbl-${ri}`;
          lbl.textContent = r.label;
          lblRow.appendChild(lbl);

          // group of bars for this round
          const g = document.createElement('div');
          g.className = 'seg-group';
          g.id = `seg-${ri}`;
          const barCount = ri === 0 ? 1 : 3;
          for (let b = 0; b < barCount; b++) {
            const bar = document.createElement('div');
            bar.className = 'seg-bar';
            bar.id = `bar-${ri}-${b}`;
            g.appendChild(bar);
          }
          row.appendChild(g);

          // node dot after each group except the last
          if (ri < ROUNDS.length - 1) {
            const node = document.createElement('div');
            node.className = 'seg-node';
            node.id = `node-${ri}`;
            row.appendChild(node);
          }
        });
      }

      function renderTrackerAtDot() {
        // Fill ALL bars in current round immediately, then renderTracker handles advance
        const barCount = st.round === 0 ? 1 : 3;
        for (let b = 0; b < barCount; b++) {
          const bar = document.getElementById(`bar-${st.round}-${b}`);
          if (bar) {
            bar.className = 'seg-bar filled';
          }
        }
        // Mark node as done
        const node = document.getElementById(`node-${st.round}`);
        if (node) {
          node.className = 'seg-node done';
        }
      }

      function renderTracker() {
        const done = st.round >= ROUNDS.length;
        const r = done ? ROUNDS[ROUNDS.length - 1] : ROUNDS[st.round];

        document.getElementById('tr-tag').textContent =
          `Round ${String(Math.min(st.round + 1, 4)).padStart(2, '0')}`;
        document.getElementById('tr-title').textContent = done ? 'Complete!' : r.title;

        // Update all bars based on state
        ROUNDS.forEach((_, ri) => {
          const barCount = ri === 0 ? 1 : 3;
          const lbl = document.getElementById(`slbl-${ri}`);
          if (lbl) {
            lbl.className = 'seg-lbl';
            if (ri < st.round) lbl.classList.add('done');
            else if (ri === st.round && !done) lbl.classList.add('active');
          }

          for (let b = 0; b < barCount; b++) {
            const bar = document.getElementById(`bar-${ri}-${b}`);
            if (!bar) continue;
            if (ri < st.round) {
              // completed round — all filled
              bar.className = 'seg-bar filled';
            } else if (ri === st.round) {
              // current round — fill based on likedThisRound
              if (b < st.likedThisRound) {
                bar.className = 'seg-bar filled';
              } else {
                bar.className = 'seg-bar';
              }
            } else {
              // future round
              bar.className = 'seg-bar';
            }
          }

          // nodes
          const node = document.getElementById(`node-${ri}`);
          if (node) {
            node.className = 'seg-node';
            if (ri < st.round) node.classList.add('done');
            else if (ri === st.round && !done) node.classList.add('active');
          }
        });
      }

      function buildPills() {} // no-op, kept for safety

      function renderCard() {
        if (st.round >= ROUNDS.length) {
          showDone();
          return;
        }
        const round = ROUNDS[st.round];
        const data = round.cards[st.card];
        if (!data) return;
        var nameEl = document.getElementById('card-name');
        var descEl = document.getElementById('card-desc');
        var visEl = document.getElementById('card-vis');
        if (!nameEl || !descEl || !visEl) return;
        nameEl.textContent = data.name;
        descEl.textContent = data.desc;
        visEl.innerHTML = makePreview(data.preview);

        // DNA match badge (only from round 2+, and only if DNA vector exists)
        const badge = document.getElementById('dna-badge');
        if (badge) {
          if (dnaVec && st.round > 0 && data.matchInfo) {
            // Rank within this round's sorted deck (card 0 = best match)
            const rank = st.card + 1;
            const total = round.cards.length;
            badge.textContent = data.matchInfo.label;
            badge.style.color = data.matchInfo.color;
            badge.style.opacity = '1';
            badge.title = `DNA rank ${rank} of ${total}`;
          } else {
            badge.style.opacity = '0';
          }
        }
        // Always sync DNA panel
        renderDNABar();
        // Always sync right context panel
        renderCtxPanel();
        // If we're in the Shape round, keep the radius editor state applied
        if (ROUND_KEYS[st.round] === 'Shape') {
          requestAnimationFrame(applyRadiusToDemo);
        }

        // Reset transform
        if (cardEl) {
          cardEl.style.transform = 'translate(0,0) rotate(0deg)';
          cardEl.style.opacity = '1';
          cardEl.classList.remove('snapping', 'throwing', 'is-dragging');
        }
        if (indLike) indLike.style.opacity = '0';
        if (indNope) indNope.style.opacity = '0';
        dragging = false;
        curX = 0;
        curY = 0;
      }

      // ══════════════════════════════════════
      //  ACTIONS
      // ══════════════════════════════════════
      function doLike() {
        if (st.round >= ROUNDS.length) return;
        const round = ROUNDS[st.round];
        const effectiveCard = _activeInjected || round.cards[st.card];
        if (!effectiveCard) return;
        _activeInjected = null;
        const likedName = effectiveCard.name;
        st.results[round.label] = likedName;
        st.likedTotal++;
        st.likedThisRound++;
        st.card++;

        // Feed DNA engine with this liked card, then update the panel
        feedDNA(likedName);
        renderDNABar();

        flash('green');

        const needLikes = st.round === 0 ? 1 : 3;
        const roundDone = st.likedThisRound >= needLikes;

        // Animate the bar that was just filled
        const filledBarIdx = st.likedThisRound - 1;
        const animBar = document.getElementById(`bar-${st.round}-${filledBarIdx}`);
        if (animBar) animBar.className = 'seg-bar filling';
        setTimeout(() => {
          if (animBar) animBar.className = 'seg-bar filled';
        }, 420);

        if (roundDone) {
          // Re-score all future rounds against accumulated DNA vector
          recalcDeck();
          renderTrackerAtDot();
          setTimeout(() => {
            st.round++;
            st.card = 0;
            st.likedThisRound = 0;
            renderCard();
            renderTracker();
          }, 480);
        } else {
          renderTracker();
          setTimeout(renderCard, 100);
        }
      }

      function doSkip() {
        if (st.round >= ROUNDS.length) return;
        _activeInjected = null;
        if (cardEl) {
          cardEl.classList.add('throwing');
          cardEl.style.transform = 'translate(0px,-600px) rotate(0deg)';
          cardEl.style.opacity = '0';
        }
        setTimeout(function () {
          st.likedThisRound = 0;
          st.card = 0;
          st.round++;
          if (st.round >= ROUNDS.length) {
            showDone();
            return;
          }
          renderTracker();
          renderCard();
        }, 240);
      }

      function doNope() {
        if (st.round >= ROUNDS.length) return;
        const round = ROUNDS[st.round];
        // If noping an injected variant, don't advance card index
        if (_activeInjected) {
          _activeInjected = null;
          // Clear alt card selection in panel
          document.querySelectorAll('.alt-card').forEach((a) => a.classList.remove('selected'));
          // Re-render the real card
          renderCard();
          flash('red');
          return;
        }
        st.nopedTotal++;
        st.card++;

        flash('red');

        // Nopes NEVER advance the round — if we run out of cards without enough likes,
        // we just keep showing the deck (or loop). For now: if no more cards, loop back.
        if (st.card >= round.cards.length) {
          // Ran out — loop round (don't advance)
          st.card = 0;
        }

        renderTracker();
        setTimeout(renderCard, 100);
      }

      // ══════════════════════════════════════
      //  SWIPE
      // ══════════════════════════════════════
      function startDrag(e) {
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        cardEl.classList.add('is-dragging');
        e.preventDefault();
      }
      function startDragT(e) {
        dragging = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        cardEl.classList.add('is-dragging');
        e.preventDefault();
      }
      function onDrag(e) {
        if (!dragging) return;
        curX = e.clientX - startX;
        curY = e.clientY - startY;
        applyTransform();
      }
      function onDragT(e) {
        if (!dragging) return;
        curX = e.touches[0].clientX - startX;
        curY = e.touches[0].clientY - startY;
        applyTransform();
        e.preventDefault();
      }
      function applyTransform() {
        const rot = curX * 0.1;
        if (cardEl) cardEl.style.transform = `translate(${curX}px,${curY}px) rotate(${rot}deg)`;
        if (indLike) indLike.style.opacity = curX > 0 ? Math.min(curX / 90, 1) : 0;
        if (indNope) indNope.style.opacity = curX < 0 ? Math.min(-curX / 90, 1) : 0;
      }
      function endDrag() {
        if (!dragging) return;
        dragging = false;
        if (cardEl) cardEl.classList.remove('is-dragging');
        if (Math.abs(curX) > 90) {
          throwCard(curX > 0);
        } else {
          snapBack();
        }
      }
      function throwCard(isLike) {
        if (cardEl) {
          cardEl.classList.add('throwing');
          const dir = isLike ? 1 : -1;
          cardEl.style.transform = `translate(${dir * 600}px,${curY}px) rotate(${dir * 25}deg)`;
          cardEl.style.opacity = '0';
        }
        setTimeout(function () {
          isLike ? doLike() : doNope();
        }, 200);
      }
      function snapBack() {
        if (cardEl) cardEl.classList.add('snapping');
        if (cardEl) cardEl.style.transform = 'translate(0,0) rotate(0deg)';
        if (indLike) indLike.style.opacity = '0';
        if (indNope) indNope.style.opacity = '0';
        curX = 0;
        curY = 0;
        setTimeout(() => {
          if (cardEl) cardEl.classList.remove('snapping');
        }, 420);
      }

      // ══════════════════════════════════════
      //  DONE
      // ══════════════════════════════════════
      function showDone() {
        document.getElementById('deck-area').style.display = 'none';
        document.getElementById('dna-bar-wrap').classList.remove('visible');
        document.getElementById('tracker').style.display = 'none';
        document.querySelector('.app').classList.add('done-mode');
        const cp = document.getElementById('ctx-panel');
        if (cp) cp.classList.remove('visible');
        const screen = document.getElementById('done-screen');
        screen.classList.add('show');
        document.getElementById('ds-output').innerHTML = buildDesignSystem();
        const btn = document.getElementById('btn-again');
        if (btn) btn.textContent = '⌂ Back';
      }

      function reset() {
        st = { round: 0, card: 0, likedThisRound: 0, likedTotal: 0, nopedTotal: 0, results: {} };
        dnaVec = null;
        dnaCount = 0;
        // Restore original card order
        ROUNDS = ROUND_KEYS.map((k) => ({
          label: k,
          title: ROUND_TITLES[k],
          cards: [...CATALOG[k]],
        }));
        document.getElementById('deck-area').style.display = '';
        document.getElementById('tracker').style.display = '';
        document.querySelector('.app').classList.remove('done-mode');
        document.getElementById('done-screen').classList.remove('show');
        const badge = document.getElementById('dna-badge');
        if (badge) badge.style.opacity = '0';
        const btn = document.getElementById('btn-again');
        if (btn) btn.textContent = '↺ Start Over';
        renderDNABar();
        _ctxLastKey = null;
        _ctxLastCard = null;
        Object.assign(radState, { tl: 8, tr: 8, bl: 8, br: 8 });
        renderCard();
        renderTracker();
      }

      // ══════════════════════════════════════
      //  RIGHT CONTEXT PANEL
      //
      //  Frame:  hidden (nothing to configure yet)
      //  Shape:  radius editor — live preview square + 4 corner sliders + presets
      //  Tone:   3 related alternatives as clickable mini previews
      //  Finish: 3 related alternatives as clickable mini previews
      //
      //  Clicking an alt card INJECTS it as the active card in the main deck
      //  so the user can Like or Nope it normally.
      // ══════════════════════════════════════

      function injectAltCard(altData) {
        _activeInjected = altData;

        // Slide the card in from the right
        cardEl.style.transition = 'none';
        cardEl.style.transform = 'translate(50px,0) scale(.95)';
        cardEl.style.opacity = '0';

        // Update content
        document.getElementById('card-name').textContent = altData.name;
        document.getElementById('card-desc').textContent = altData.desc;
        document.getElementById('card-vis').innerHTML = makePreview(altData.preview);

        // Animate in
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            cardEl.style.transition =
              'transform .38s cubic-bezier(.34,1.56,.64,1), opacity .25s ease';
            cardEl.style.transform = 'translate(0,0) scale(1)';
            cardEl.style.opacity = '1';
          });
        });

        cardEl.classList.remove('snapping', 'throwing', 'is-dragging');
        indLike.style.opacity = '0';
        indNope.style.opacity = '0';
        dragging = false;
        curX = 0;
        curY = 0;

        // Show "variant" badge
        const badge = document.getElementById('dna-badge');
        if (badge) {
          badge.textContent = 'Variant · like or nope it';
          badge.style.color = 'rgba(13,13,13,.4)';
          badge.style.opacity = '1';
          // Remove the ::before dot color override
          badge.style.setProperty('--badge-dot', 'rgba(13,13,13,.3)');
        }
      }

      function clearInjected() {
        if (!_activeInjected) return;
        _activeInjected = null;
        renderCard(); // restore the real deck card
      }

      // Patch doLike/doNope to handle injected cards:
      // We wrap them — see patchedLike / patchedNope below.
      // The injected card is treated as a like/nope of a NEW card name
      // (saved into results as an override, doesn't advance st.card since it's extra).

      // ── Main render ───────────────────────────────────────────────────────────────
      function renderCtxPanel() {
        const panel = document.getElementById('ctx-panel');
        const ctxTag = document.getElementById('ctx-tag');
        const ctxTit = document.getElementById('ctx-title');
        const ctxBod = document.getElementById('ctx-body');
        if (!panel) return;

        const roundKey = ROUND_KEYS[st.round];
        const cardIndex = st.card;
        const roundChanged = _ctxLastKey !== roundKey;
        const cardChanged = _ctxLastCard !== cardIndex;
        _ctxLastKey = roundKey;
        _ctxLastCard = cardIndex;

        if (roundChanged) _activeInjected = null;

        if (roundKey === 'Frame') {
          panel.classList.add('visible');
          ctxTag.textContent = 'Frame';
          ctxTit.textContent = 'Foundation';
          if (roundChanged) {
            ctxBod.innerHTML =
              '<div style="display:flex;flex-direction:column;gap:10px;"><div style="font-family:\'DM Mono\',monospace;font-size:8.5px;line-height:1.7;color:rgba(13,13,13,.45);">Pick your foundation layout. This seeds the DNA engine — every subsequent round reorders around your choice.</div><div style="display:flex;flex-direction:column;gap:4px;">' +
              ['Bento Grid', 'Split Layout', 'Swiss Grid', 'Editorial']
                .map(
                  (n) =>
                    '<div style="font-size:12px;padding:5px 8px;background:rgba(13,13,13,.04);border-radius:5px;border:1px solid rgba(13,13,13,.08);color:rgba(13,13,13,.5);">' +
                    n +
                    '</div>'
                )
                .join('') +
              '</div><div style="font-family:\'DM Mono\',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,77,0,.65);padding-top:6px;border-top:1px solid rgba(13,13,13,.08);">No adjustments · swipe to choose</div></div>';
          }
          return;
        }

        if (roundKey === 'Shape') {
          panel.classList.add('visible');
          ctxTag.textContent = 'Shape';
          ctxTit.textContent = 'Radius Editor';
          if (roundChanged) {
            ctxBod.innerHTML = buildRadiusEditor();
            attachRadiusListeners();
          }
          return;
        }

        if (roundKey === 'Tone' || roundKey === 'Finish') {
          panel.classList.add('visible');
          ctxTag.textContent = roundKey;
          ctxTit.textContent = 'Related Styles';
          if (roundChanged || cardChanged) {
            const altMap = roundKey === 'Tone' ? TONE_ALTS : FINISH_ALTS;
            const card = ROUNDS[st.round].cards[st.card];
            ctxBod.innerHTML = buildAltCards(card ? card.name : null, altMap);
            attachAltListeners(altMap);
          }
          return;
        }

        panel.classList.remove('visible');
      }

      // ── Radius editor ─────────────────────────────────────────────────────────────
      function buildRadiusEditor() {
        const { tl, tr, bl, br } = radState;
        const r = `${tl}px ${tr}px ${br}px ${bl}px`;
        const presets = [
          ['Sharp', '0,0,0,0'],
          ['Soft', '8,8,8,8'],
          ['Round', '14,14,14,14'],
          ['Pill', '99,99,99,99'],
          ['Asym', '0,14,14,0'],
        ];
        const sliders = [
          ['Top Left', 'tl', tl],
          ['Top Right', 'tr', tr],
          ['Bot Right', 'br', br],
          ['Bot Left', 'bl', bl],
        ];
        return `
<div class="radius-preview-wrap">
  <div class="radius-demo" id="radius-demo" style="border-radius:${r};"></div>
</div>
<div class="radius-presets">
  ${presets.map(([l, v]) => `<button class="rad-preset" data-preset="${v}">${l}</button>`).join('')}
</div>
<div class="radius-sliders">
  ${sliders
    .map(
      ([label, key, val]) => `
  <div class="rad-row">
    <div class="rad-label-row">
      <span class="rad-label">${label}</span>
      <span class="rad-val" id="rad-val-${key}">${val}px</span>
    </div>
    <input type="range" class="rad-slider" id="rad-${key}" min="0" max="99" value="${val}">
  </div>`
    )
    .join('')}
</div>`;
      }

      function attachRadiusListeners() {
        ['tl', 'tr', 'bl', 'br'].forEach((key) => {
          const inp = document.getElementById(`rad-${key}`);
          if (!inp) return;
          inp.addEventListener('input', () => {
            radState[key] = +inp.value;
            const v = document.getElementById(`rad-val-${key}`);
            if (v) v.textContent = radState[key] + 'px';
            applyRadiusToDemo();
          });
        });
        document.querySelectorAll('.rad-preset').forEach((btn) => {
          btn.addEventListener('click', () => {
            const [a, b, d, e] = btn.dataset.preset.split(',').map(Number);
            Object.assign(radState, { tl: a, tr: b, bl: e, br: d });
            ['tl', 'tr', 'bl', 'br'].forEach((k) => {
              const i = document.getElementById(`rad-${k}`);
              const v = document.getElementById(`rad-val-${k}`);
              if (i) i.value = radState[k];
              if (v) v.textContent = radState[k] + 'px';
            });
            applyRadiusToDemo();
            document.querySelectorAll('.rad-preset').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });
      }

      function applyRadiusToDemo() {
        const r = `${radState.tl}px ${radState.tr}px ${radState.br}px ${radState.bl}px`;
        // Update the small demo box in the editor
        const demo = document.getElementById('radius-demo');
        if (demo) demo.style.borderRadius = r;
        // Update the actual card preview component — the inner wrapper div
        const vis = document.getElementById('card-vis');
        if (vis) {
          // Target the component card: second child of the padding wrapper
          const wrapper = vis.querySelector('div'); // outer padding div
          const component = wrapper && wrapper.children[0]; // the actual card component
          if (component) {
            component.style.borderRadius = r;
            component.style.overflow = 'hidden';
            // Also apply to header bar inside so it clips correctly
            const header = component.children[0];
            if (header) {
              header.style.borderRadius = `${radState.tl}px ${radState.tr}px 0 0`;
            }
          }
        }
      }

      // ── Alt cards (Tone / Finish) ─────────────────────────────────────────────────
      function buildAltCards(currentName, altMap) {
        const alts = altMap[currentName];
        // If no named alt list, show the round's other cards instead
        const cards =
          alts && alts.length
            ? alts
            : (() => {
                const round = ROUNDS[st.round];
                return round.cards.filter((_, i) => i !== st.card).slice(0, 3);
              })();

        if (!cards.length) {
          return '<div style="font-size:8.5px;color:rgba(13,13,13,.35);line-height:1.7;padding:4px 0;">No related styles found for this card.</div>';
        }

        const headerText =
          alts && alts.length
            ? '<div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(13,13,13,.35);margin-bottom:8px;">Variants of <strong style="color:var(--ink);">' +
              (currentName || '') +
              '</strong></div>'
            : '<div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(13,13,13,.35);margin-bottom:8px;">Other options this round</div>';

        return (
          headerText +
          buildAltCardsFromData(cards) +
          '<div style="margin-top:6px;font-size:9px;color:rgba(13,13,13,.3);letter-spacing:.04em;line-height:1.4;">Click to load as main card — then Like or Nope it.</div>'
        );
      }

      function buildAltCardsFromData(alts) {
        return (
          '<div class="alt-cards">' +
          alts
            .map(
              (alt, i) =>
                '<div class="alt-card" data-alt-i="' +
                i +
                '" data-alt-name="' +
                alt.name +
                '" data-alt-desc="' +
                alt.desc +
                '" data-alt-preview="' +
                alt.preview +
                '">' +
                '<div class="alt-thumb">' +
                makePreview(alt.preview) +
                '</div>' +
                '<div class="alt-info">' +
                '<div><div class="alt-name">' +
                alt.name +
                '</div><div class="alt-match">' +
                alt.desc +
                '</div></div>' +
                '<div style="font-size:11px;color:rgba(13,13,13,.25);flex-shrink:0;">→</div>' +
                '</div>' +
                '</div>'
            )
            .join('') +
          '</div>'
        );
      }

      function attachAltListeners(altMap) {
        document.querySelectorAll('.alt-card').forEach((el) => {
          el.addEventListener('click', () => {
            // Deselect all
            document.querySelectorAll('.alt-card').forEach((e) => e.classList.remove('selected'));
            el.classList.add('selected');
            // Inject into main card
            injectAltCard({
              name: el.dataset.altName,
              desc: el.dataset.altDesc,
              preview: el.dataset.altPreview,
            });
          });
        });
      }

      // ══════════════════════════════════════
      //  BOOT

      document.getElementById('btn-like').addEventListener('click', () => {
        throwCard(true);
      });
      document.getElementById('btn-nope').addEventListener('click', () => {
        throwCard(false);
      });
      document.getElementById('btn-skip').addEventListener('click', doSkip);
      const btnAgain = document.getElementById('btn-again');
      if (btnAgain) btnAgain.addEventListener('click', () => { window.location.href = 'index.html'; });
      document.getElementById('btn-back').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') throwCard(true);
        if (e.key === 'ArrowLeft') throwCard(false);
        if (e.key === 'ArrowUp') doSkip();
        if (e.key === 'r' || e.key === 'R') reset();
      });

      // Boot — get refs (script is at end of body so DOM is ready)
      cardEl = document.getElementById('card');
      indLike = document.getElementById('ind-like');
      indNope = document.getElementById('ind-nope');
      console.log(
        'Engine boot: card=',
        !!cardEl,
        'deck-area=',
        !!document.getElementById('deck-area')
      );
      if (!cardEl || !indLike || !indNope) {
        console.error('Engine: missing card elements');
        var da = document.getElementById('deck-area');
        if (da)
          da.innerHTML =
            '<div style="padding:40px;text-align:center;color:#999;">Failed to load. Check console.</div>';
      } else {
        cardEl.addEventListener('mousedown', startDrag);
        cardEl.addEventListener('touchstart', startDragT, { passive: false });
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('touchmove', onDragT, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
        init();
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  </body>
</html>
